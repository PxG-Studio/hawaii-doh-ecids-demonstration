<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hawaii DOH - Early Intervention Section (PEICS)</title>
    <!-- Google Fonts Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Core Application -->
    <script src="app.js" defer></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            overscroll-behavior: none; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            min-height: 100vh;
        }
        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card-hover:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.55);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 40px 0 rgba(99, 102, 241, 0.15);
        }

        /* 3D Playing Card Flip Mechanics */
        .flip-container {
            perspective: 2000px;
            width: 100%;
            min-height: 80vh;
        }
        .flip-card {
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .flip-card.flipped {
            transform: rotateY(180deg);
        }
        .flip-front, .flip-back {
            width: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
            z-index: -1;
        }
        .flip-card.flipped .flip-back {
            position: relative;
            z-index: 10;
        }
        .flip-card.flipped .flip-front {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="font-sans text-slate-100 antialiased">
    <div id="app" class="pb-12">
        <!-- Initial Loader -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center space-y-4">
                <div class="relative w-16 h-16 mx-auto">
                    <div class="absolute inset-0 rounded-full border-4 border-indigo-500/20"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-t-indigo-400 animate-spin"></div>
                </div>
                <p class="text-indigo-300 font-outfit text-sm font-medium tracking-wide animate-pulse">Initializing Security Framework...</p>
            </div>
        </div>
    </div>
</body>
</html>
